services:
  sizing-service:
    build:
      context: .
      dockerfile: src/SizingService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
    ports:
      - "8080:80"

  frontend:
    build:
      context: .
      dockerfile: src/Frontend/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - services__sizing-service__http__0=http://sizing-service:80
    ports:
      - "8081:80"
    depends_on:
      - sizing-service
